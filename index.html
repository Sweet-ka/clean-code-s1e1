<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo App</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Lato:300,400,700">
  <link rel="stylesheet" href="style.css" media="screen">
</head>
<body>
  <header>
    <img class="matrix" src="./eisenhower-matrix.jpg" alt="the Eisenhower matrix">
    <a class="more-inf" href="https://goal-life.com/page/method/matrix-eisenhower">Want more details?</a>
  </header>
  <section id="section-for-add">
    <label for="new-task">Add Item</label>
    <div class="task-row-wrapper">
      <input id="new-task" class="task" type="text">
      <button>Add</button>
    </div>
  </section>
  <section>
    <h3>Todo</h3>
    <ul id="incomplete-tasks">
      <li>
        <input type="checkbox"><label class="task incomplete-tasks__input-checkbox">Pay Bills</label>
        <input type="text" class="incomplete-tasks__input-text">
        <button class="edit incomplete-tasks__button-edit">Edit</button>
        <button class="delete incomplete-tasks__button-delete"><img src="./remove.svg" alt=""></button>
      </li>
      <li>
        <input type="checkbox"><label class="task incomplete-tasks__input-checkbox">Go Shopping</label>
        <input type="text" class="incomplete-tasks__input-text">
        <button class="edit incomplete-tasks__button-edit">Edit</button>
        <button class="delete incomplete-tasks__button-delete"><img src="./remove.svg" alt=""></button>
      </li>
    </ul>
  </section>
  <section>
    <h3>Completed</h3>
    <ul id="completed-tasks">
      <li>
        <input type="checkbox" checked><label class="task completed-tasks__input-checkbox">See the Doctor</label>
        <input type="text" class="completed-tasks__input-text">
        <button class="edit completed-tasks__button-edit">Edit</button>
        <button class="delete completed-tasks__button-delete"><img src="./remove.svg" alt=""></button>
      </li>
    </ul>   
  </section>
  <script type="text/javascript" SRC="app.js"></script>
</body>
</html>
